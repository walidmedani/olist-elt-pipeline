version: 2

models:
  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_status
        tests:
          - not_null
      - name: total_payment_value

  - name: fct_order_items
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: price
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: product_category_name_english
        tests:
          - not_null
